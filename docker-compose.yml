# Default: SQLite volume (simple).
# Postgres: set COMPOSE_PROFILES=postgres and DATABASE_URL to postgres URL
#   DATABASE_URL=postgresql+psycopg://gpa:gpa@db:5432/gpa
services:
  web:
    build: .
    ports:
      - "${COMPOSE_HTTP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:-please-change-me-to-a-long-random-string}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/app.db}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS:-20}
      PLATI_MAX_PAGES: ${PLATI_MAX_PAGES:-5}
      PLATI_PAGE_SIZE: ${PLATI_PAGE_SIZE:-100}
      GGSEL_LIMIT: ${GGSEL_LIMIT:-100}
      DIGISELLER_PARTNER_ID: ${DIGISELLER_PARTNER_ID:-}
      ADS_ENABLED: ${ADS_ENABLED:-true}
      ADS_CONTACT_EMAIL: ${ADS_CONTACT_EMAIL:-ads@example.com}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      FREE_SEARCHES_PER_DAY: ${FREE_SEARCHES_PER_DAY:-15}
      GUEST_SEARCHES_PER_DAY: ${GUEST_SEARCHES_PER_DAY:-5}
    volumes:
      - gpa_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
        required: false

  db:
    profiles: ["postgres"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gpa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gpa}
      POSTGRES_DB: gpa
    volumes:
      - gpa_pg:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpa -d gpa"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  gpa_data:
  gpa_pg:
