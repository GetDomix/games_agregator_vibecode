services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8080}:8000"
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_URL: ${APP_URL:-http://localhost:8080}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      DIGISELLER_PARTNER_ID: ${DIGISELLER_PARTNER_ID:-}
      ADS_ENABLED: ${ADS_ENABLED:-true}
      ADS_CONTACT_EMAIL: ${ADS_CONTACT_EMAIL:-ads@example.com}
    volumes:
      - gpa_sqlite:/var/www/html/database
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ""
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  gpa_sqlite:
