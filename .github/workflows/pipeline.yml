name: Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: 1 · Backend (Postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gpa_test
          POSTGRES_USER: gpa
          POSTGRES_PASSWORD: gpa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gpa -d gpa_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, pdo_pgsql, pgsql, zip, tokenizer, xml, ctype, json, bcmath
          coverage: none
      - name: Install Composer deps
        run: |
          cp .env.example .env
          # skip artisan scripts until key + DB env exist
          composer install --no-interaction --prefer-dist --no-scripts
          php artisan key:generate --force
          composer dump-autoload -o
          php artisan package:discover --ansi
      - name: Configure env (PostgreSQL)
        run: |
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=pgsql/' .env
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^DB_PORT=.*/DB_PORT=5432/' .env
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=gpa_test/' .env
          sed -i 's/^DB_USERNAME=.*/DB_USERNAME=gpa/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=gpa/' .env
      - name: Migrate
        run: php artisan migrate --force
      - name: Feature smoke (health + register)
        run: |
          php artisan serve --host=127.0.0.1 --port=8080 &
          sleep 3
          curl -fsS http://127.0.0.1:8080/api/health
          curl -fsS -X POST http://127.0.0.1:8080/api/auth/register \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json' \
            -d '{"email":"ci@test.local","password":"password1","display_name":"CI"}'
      - name: PHPUnit
        run: php artisan test

  frontend-build:
    name: 2 · Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci || npm install
      - run: npm run build

  deploy:
    name: 3 · Deploy VPS
    needs: [backend-test, frontend-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          test -n "$DEPLOY_HOST" && test -n "$DEPLOY_USER" && test -n "$DEPLOY_SSH_KEY"
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
      - name: known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
        run: mkdir -p ~/.ssh && ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
      - name: Rsync
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/gpa' }}
        run: |
          ssh -p "$DEPLOY_PORT" "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_PATH}'"
          rsync -az --delete \
            -e "ssh -p $DEPLOY_PORT" \
            --exclude '.git/' --exclude 'node_modules/' --exclude 'backend/vendor/' \
            --exclude 'legacy/' --exclude '.venv/' --exclude 'data/' \
            --exclude 'backend/.env' --exclude '.env' \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"
      - name: Compose up (Postgres + app)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/gpa' }}
          APP_KEY: ${{ secrets.APP_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          # Pass deploy vars into remote shell (quoted heredoc would drop them)
          ssh -p "$DEPLOY_PORT" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            env \
              DEPLOY_PATH="$DEPLOY_PATH" \
              APP_KEY="${APP_KEY:-}" \
              POSTGRES_PASSWORD="${POSTGRES_PASSWORD:-}" \
              bash -s <<'EOS'
          set -euo pipefail
          cd "$DEPLOY_PATH"

          # Free host :80/:443 (system nginx / apache / host caddy from older stack)
          for svc in nginx apache2 httpd caddy; do
            if systemctl is-active --quiet "$svc" 2>/dev/null; then
              systemctl stop "$svc" || true
              systemctl disable "$svc" || true
              echo "stopped host $svc to free ports"
            fi
          done

          # Legacy Python container name from previous compose service
          docker rm -f gpa-web-1 2>/dev/null || true

          # Drop orphans and free 80/443 before recreate (Caddy needs both)
          docker compose down --remove-orphans 2>/dev/null || true
          for p in 80 443; do
            if ss -tlnp 2>/dev/null | grep -qE ":${p} "; then
              echo "port ${p} still in use — forcing free"
              fuser -k "${p}/tcp" 2>/dev/null || true
            fi
          done
          sleep 1

          HOST_IP="$(hostname -I | awk '{print $1}')"
          HTTPS_HOST="gpa.${HOST_IP}.sslip.io"
          HTTPS_URL="https://${HTTPS_HOST}"

          # Create .env once; never rotate POSTGRES_PASSWORD after volume init
          if [ ! -f .env ]; then
            APP_KEY_VAL="${APP_KEY:-}"
            if [ -z "$APP_KEY_VAL" ]; then
              APP_KEY_VAL="base64:$(openssl rand -base64 32 | tr -d '\n')"
            fi
            PG_PASS="${POSTGRES_PASSWORD:-}"
            if [ -z "$PG_PASS" ]; then
              PG_PASS="$(openssl rand -hex 16)"
            fi
            cat > .env <<EOF
          APP_ENV=production
          APP_DEBUG=false
          APP_KEY=${APP_KEY_VAL}
          APP_URL=${HTTPS_URL}
          FRONTEND_URL=${HTTPS_URL}
          POSTGRES_DB=gpa
          POSTGRES_USER=gpa
          POSTGRES_PASSWORD=${PG_PASS}
          BACKEND_PORT=8080
          CORS_ORIGINS=*
          SANCTUM_STATEFUL_DOMAINS=${HTTPS_HOST},${HOST_IP},localhost,127.0.0.1
          EOF
            sed -i 's/^[[:space:]]*//' .env
            chmod 600 .env
            echo "wrote compose .env"
          else
            grep -q '^POSTGRES_DB=' .env || echo 'POSTGRES_DB=gpa' >> .env
            grep -q '^POSTGRES_USER=' .env || echo 'POSTGRES_USER=gpa' >> .env
            grep -q '^BACKEND_PORT=' .env || echo 'BACKEND_PORT=8080' >> .env
            # Prefer free HTTPS hostname (sslip.io) for APP_URL
            if grep -qE '^APP_URL=http://' .env; then
              sed -i "s|^APP_URL=.*|APP_URL=${HTTPS_URL}|" .env
              sed -i "s|^FRONTEND_URL=.*|FRONTEND_URL=${HTTPS_URL}|" .env
            fi
            if ! grep -qE '^POSTGRES_PASSWORD=.+' .env; then
              PG_PASS="${POSTGRES_PASSWORD:-$(openssl rand -hex 16)}"
              echo "POSTGRES_PASSWORD=${PG_PASS}" >> .env
            fi
            if ! grep -qE '^APP_KEY=base64:.+' .env; then
              if [ -n "${APP_KEY:-}" ]; then
                echo "APP_KEY=${APP_KEY}" >> .env
              else
                echo "APP_KEY=base64:$(openssl rand -base64 32 | tr -d '\n')" >> .env
              fi
            fi
            echo "reusing existing compose .env"
          fi

          docker compose up -d --build --remove-orphans
          docker compose ps

          # Wait for API via Caddy edge
          echo "waiting for /api/health..."
          for i in $(seq 1 50); do
            if curl -fsS http://127.0.0.1/api/health >/dev/null 2>&1; then
              curl -fsS http://127.0.0.1/api/health
              echo
              # Best-effort HTTPS (cert may take a few seconds on first boot)
              curl -fsSk "${HTTPS_URL}/api/health" >/dev/null 2>&1 && echo "https ok: ${HTTPS_URL}" || echo "https pending: ${HTTPS_URL}"
              docker logs --tail 15 gpa-tunnel-1 2>&1 | grep -oE 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' | tail -1 || true
              exit 0
            fi
            sleep 3
          done
          echo "health check failed; logs:" >&2
          docker logs --tail 40 gpa-backend-1 >&2 || true
          docker logs --tail 30 gpa-caddy-1 >&2 || true
          docker logs --tail 20 gpa-frontend-1 >&2 || true
          exit 1
          EOS
      - name: Health (public)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          for i in $(seq 1 30); do
            if curl -fsS "http://${DEPLOY_HOST}/api/health"; then
              echo
              curl -fsSk "https://gpa.${DEPLOY_HOST}.sslip.io/api/health" && echo || true
              exit 0
            fi
            sleep 4
          done
          exit 1
