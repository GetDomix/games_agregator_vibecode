name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip CI tests (emergency only)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    name: Pre-deploy tests
    if: github.event_name != 'workflow_dispatch' || inputs.skip_tests != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install & test
        env:
          APP_ENV: development
          SECRET_KEY: ci-test-secret-not-for-production
          DATABASE_URL: sqlite://
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pytest -v --tb=short

  deploy:
    name: Deploy to VPS (by IP)
    needs: [test]
    # success after tests, or skipped tests on manual emergency deploy
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          missing=0
          [ -z "$DEPLOY_HOST" ] && echo "::error::Secret DEPLOY_HOST is empty (VPS IP)" && missing=1
          [ -z "$DEPLOY_USER" ] && echo "::error::Secret DEPLOY_USER is empty" && missing=1
          [ -z "$DEPLOY_SSH_KEY" ] && echo "::error::Secret DEPLOY_SSH_KEY is empty" && missing=1
          exit $missing

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add host to known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || {
            echo "ssh-keyscan failed, retry..."
            sleep 2
            ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          }

      - name: Rsync project to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/gpa' }}
        run: |
          rsync -az --delete \
            -e "ssh -p $DEPLOY_PORT -o StrictHostKeyChecking=yes" \
            --exclude '.git/' \
            --exclude '.venv/' \
            --exclude 'venv/' \
            --exclude '__pycache__/' \
            --exclude '.pytest_cache/' \
            --exclude 'data/' \
            --exclude '.env' \
            --exclude '*.db' \
            --exclude '*.db-*' \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Ensure .env on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/gpa' }}
          APP_SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}
          DIGISELLER_PARTNER_ID: ${{ secrets.DIGISELLER_PARTNER_ID }}
          ADS_CONTACT_EMAIL: ${{ secrets.ADS_CONTACT_EMAIL }}
        run: |
          ssh -p "$DEPLOY_PORT" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            DEPLOY_PATH="$DEPLOY_PATH" \
            APP_SECRET_KEY="$APP_SECRET_KEY" \
            DIGISELLER_PARTNER_ID="$DIGISELLER_PARTNER_ID" \
            ADS_CONTACT_EMAIL="$ADS_CONTACT_EMAIL" \
            'bash -s' <<'EOS'
          set -euo pipefail
          cd "$DEPLOY_PATH"
          if [ ! -f .env ]; then
            echo "Creating .env on server..."
            SECRET="${APP_SECRET_KEY:-}"
            if [ -z "$SECRET" ]; then
              SECRET=$(openssl rand -hex 32)
              echo "Generated random SECRET_KEY (stored only on server .env)"
            fi
            cat > .env <<EOF
          APP_ENV=production
          SECRET_KEY=${SECRET}
          DATABASE_URL=sqlite:////data/app.db
          ACCESS_TOKEN_EXPIRE_MINUTES=10080
          CORS_ORIGINS=*
          DIGISELLER_PARTNER_ID=${DIGISELLER_PARTNER_ID:-}
          ADS_ENABLED=true
          ADS_CONTACT_EMAIL=${ADS_CONTACT_EMAIL:-ads@example.com}
          ADS_LABEL=Реклама
          HTTP_TIMEOUT_SECONDS=20
          PLATI_MAX_PAGES=5
          PLATI_PAGE_SIZE=100
          GGSEL_LIMIT=100
          EOF
            chmod 600 .env
          else
            echo ".env already exists — not overwriting"
          fi
          EOS

      - name: Docker compose up
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/gpa' }}
          DEPLOY_HTTP_PORT: ${{ secrets.DEPLOY_HTTP_PORT || '8000' }}
        run: |
          ssh -p "$DEPLOY_PORT" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            DEPLOY_PATH="$DEPLOY_PATH" \
            DEPLOY_HTTP_PORT="$DEPLOY_HTTP_PORT" \
            'bash -s' <<'EOS'
          set -euo pipefail
          cd "$DEPLOY_PATH"
          if ! command -v docker >/dev/null 2>&1; then
            echo "Docker not installed. Run deploy/setup-server.sh once on the VPS."
            exit 1
          fi
          # Allow binding host port from env
          export COMPOSE_HTTP_PORT="${DEPLOY_HTTP_PORT:-8000}"
          docker compose -f docker-compose.yml -f deploy/docker-compose.override.yml up -d --build --remove-orphans
          docker compose ps
          EOS

      - name: Health check via IP
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_HTTP_PORT: ${{ secrets.DEPLOY_HTTP_PORT || '8000' }}
        run: |
          url="http://${DEPLOY_HOST}:${DEPLOY_HTTP_PORT}/api/health"
          echo "Checking $url"
          for i in $(seq 1 30); do
            if curl -fsS --connect-timeout 5 "$url"; then
              echo
              echo "Deploy OK → http://${DEPLOY_HOST}:${DEPLOY_HTTP_PORT}/"
              exit 0
            fi
            echo "attempt $i failed, retry..."
            sleep 3
          done
          echo "::error::Health check failed for $url"
          exit 1
