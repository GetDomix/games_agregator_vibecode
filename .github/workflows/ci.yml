name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        env:
          APP_ENV: development
          SECRET_KEY: ci-test-secret-not-for-production
          DATABASE_URL: sqlite://
          ADS_ENABLED: "true"
        run: pytest -v --tb=short

  docker-build:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t gpa:ci .

      - name: Run container healthcheck
        run: |
          docker run -d --name gpa-ci \
            -e APP_ENV=production \
            -e SECRET_KEY=ci-docker-secret-key-min-32-chars-long \
            -e DATABASE_URL=sqlite:////data/app.db \
            -e CORS_ORIGINS=* \
            -p 8000:8000 \
            gpa:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/api/health; then
              echo
              echo "Health OK"
              docker stop gpa-ci
              exit 0
            fi
            sleep 2
          done
          docker logs gpa-ci || true
          docker stop gpa-ci || true
          exit 1
